<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0e0f13">
  <title>Studio IA — Régie</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <!-- ══ Écran de connexion ══════════════════════════════════════════════ -->
  <section id="vue-connexion" class="vue vue-centree">
    <div class="carte-connexion">
      <div class="logo">🎬</div>
      <h1>Studio IA</h1>
      <p class="sous-titre">Régie mobile — pilotez vos productions</p>
      <form id="form-connexion" autocomplete="on">
        <label>Nom d'utilisateur
          <input id="ch-nom" name="username" type="text" required autocomplete="username" inputmode="text">
        </label>
        <label>Mot de passe
          <input id="ch-mdp" name="password" type="password" required autocomplete="current-password">
        </label>
        <button type="submit" class="btn btn-principal" id="btn-connexion">Se connecter</button>
        <p id="erreur-connexion" class="message-erreur" hidden></p>
      </form>
    </div>
  </section>

  <!-- ══ Tableau de bord (liste des productions) ═════════════════════════ -->
  <section id="vue-tableau" class="vue" hidden>
    <header class="barre">
      <div class="titre-barre">
        <span class="logo-petit">🎬</span>
        <div>
          <strong>Studio IA</strong>
          <small id="badge-role" class="badge-role"></small>
        </div>
      </div>
      <div class="actions-barre">
        <button id="btn-rafraichir" class="btn-icone" title="Rafraîchir">↻</button>
        <button id="btn-deconnexion" class="btn-icone" title="Se déconnecter">⏻</button>
      </div>
    </header>

    <main class="contenu">
      <button id="btn-nouvelle" class="btn btn-principal btn-large" hidden>+ Nouvelle production</button>
      <div id="liste-productions" class="liste"></div>
      <p id="liste-vide" class="etat-vide" hidden>Aucune production pour l'instant.</p>
    </main>
  </section>

  <!-- ══ Détail d'une production ═════════════════════════════════════════ -->
  <section id="vue-detail" class="vue" hidden>
    <header class="barre">
      <button id="btn-retour" class="btn-icone" title="Retour">←</button>
      <div class="titre-barre"><strong>Détail de la production</strong></div>
      <button id="btn-rafraichir-detail" class="btn-icone" title="Rafraîchir">↻</button>
    </header>
    <main class="contenu" id="contenu-detail"></main>
  </section>

  <!-- ══ Fenêtre « nouvelle production » ═════════════════════════════════ -->
  <div id="modale" class="modale" hidden>
    <div class="modale-carte">
      <h2>Nouvelle production</h2>
      <form id="form-production">
        <label>Idée du film
          <textarea id="ch-idee" rows="4" required
                    placeholder="Ex. : un chat détective dans un Paris pluvieux…"></textarea>
        </label>
        <label>Modèle (optionnel)
          <input id="ch-modele" type="text" placeholder="Ex. : gpt-4o">
        </label>
        <div class="modale-actions">
          <button type="button" id="btn-annuler" class="btn btn-secondaire">Annuler</button>
          <button type="submit" class="btn btn-principal">Lancer</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Notification éphémère -->
  <div id="toast" class="toast" hidden></div>

  <script src="/app.js"></script>
</body>
</html>
